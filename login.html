<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Login & Registration Overlay on Image</title>
    <link rel="stylesheet" href="styles.css"> <!-- Liên kết file CSS -->

</head>
<body>
    <!-- Khối đăng nhập -->
    <div class="container active" id="loginContainer">
        <h2>Login</h2>
        <form onsubmit="return loginRedirect(event)">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div id="errorMessage" class="error"></div>
        </form>      
        <div class="toggle" onclick="toggleForms()">Bạn không có tài khoản? Đăng ký</div>
    </div>

    <!-- Khối đăng ký -->
    <div class="container" id="registerContainer">
        <h2>Register</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>
        <div class="toggle" onclick="toggleForms()">Bạn đã có tài khoản? Đăng nhập</div>
    </div>

</body>
</html>
